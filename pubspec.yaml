name: aurora
description: "Aurora is a Pomodoro timer built around a simple flow of work and rest sessions."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/icon.png

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/font/Outfit.ttf
